name: Merge Request
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checkout:
    name: Checkout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Run typecheck
        shell: bash
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Run ESLint
        shell: bash
        run: npm run lint

  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
