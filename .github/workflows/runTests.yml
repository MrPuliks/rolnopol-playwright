name: Run tests
on: 
  workflow_dispatch:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  tests:
    name: Run tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/run_app

      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup_node

      - uses: ./.github/actions/install_dependencies

      - uses: ./.github/actions/install_playwright_browsers

      - uses: ./.github/actions/run_playwright_tests

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
