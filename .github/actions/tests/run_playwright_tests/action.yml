name: Run Playwright tests
description: Runs Playwright tests

inputs:
  browser:
    required: true
  workers:
    required: true
  shardIndex:
    required: true
  shardTotal:
    required: true

runs:
  using: composite
  steps:
    - name: Run Playwright tests
      shell: bash
      run: |
        if [ "${{ inputs.browser }}" = "all" ]; then
          npm run test:github -- \
            --workers=${{ inputs.workers }} \
            --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        else
          npm run test:github -- \
            --project=${{ inputs.browser }} \
            --workers=${{ inputs.workers }} \
            --shard=${{ inputs.shardIndex }}/${{ inputs.shardTotal }}
        fi
